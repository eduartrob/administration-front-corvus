server {
    listen 80;
    server_name corvus.eduartrob.site;
    # Redirigir todo el tráfico HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name corvus.eduartrob.site;

    ssl_certificate /etc/letsencrypt/live/corvus.eduartrob.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/corvus.eduartrob.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Dashboard React (Archivos estáticos)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso para el API Gateway (Backend)
    location /api/v1/ {
        proxy_pass http://api-gateway:3000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Opcional: configurar timeouts
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
