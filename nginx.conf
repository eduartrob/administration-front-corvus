server {
    listen 80;
    server_name localhost;

    # Dashboard React (Archivos estáticos)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso para el API Gateway (Backend)
    location /api/v1/ {
        # 'api-gateway' es el nombre del servicio en docker-compose
        proxy_pass http://api-gateway:3000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Opcional: configurar timeouts si el Llama 3 tarda mucho
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
